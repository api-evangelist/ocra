aid: ocra
name: OCRA
description: >-
  OCRA (OATH Challenge-Response Algorithm) is a standard for generating
  one-time passwords based on challenge-response authentication as defined
  in RFC 6287. It extends HOTP and TOTP with challenge-response capabilities
  for stronger authentication scenarios.
